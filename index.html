<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CAT Ujian</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #f3f4f6;
    color: #111827;
    padding-top: 140px;
  }

  /* ===================== HEADER STICKY ===================== */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 999;
    background: #1e3a8a;
    color: #fff;
    padding: 8px 10px 10px 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,.3);
  }
  .header-row1 {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  #timer {
    font-size: 20px;
    font-weight: bold;
    font-variant-numeric: tabular-nums;
  }
  #btnSelesai {
    background: #dc2626;
    color: #fff;
    border: none;
    padding: 9px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
  }
  .nav-grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 4px;
    max-height: 160px;
    overflow-y: auto;
    padding-right: 2px;
  }
  .nav-btn {
    width: 32px;
    height: 32px;
    border: 2px solid #fff;
    background: transparent;
    color: #fff;
    font-size: 11px;
    border-radius: 4px;
    cursor: pointer;
    padding: 0;
  }
  .nav-btn.answered {
    background: #16a34a;
    border-color: #16a34a;
    color: #fff;
  }
  .nav-btn.active {
    background: #facc15;
    border-color: #facc15;
    color: #000;
    font-weight: bold;
  }

  /* ===================== START SCREEN ===================== */
  #startScreen {
    max-width: 480px;
    margin: 20px auto;
    background: #fff;
    border-radius: 10px;
    padding: 24px 20px;
    box-shadow: 0 2px 10px rgba(0,0,0,.1);
    text-align: center;
  }
  #startScreen h1 {
    color: #1e3a8a;
    font-size: 20px;
    margin-bottom: 6px;
  }
  #startScreen p.info {
    color: #374151;
    font-size: 14px;
    margin-bottom: 20px;
  }
  #inputNama {
    width: 100%;
    padding: 12px;
    font-size: 15px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    margin-bottom: 16px;
  }
  #btnMulai {
    width: 100%;
    background: #1e3a8a;
    color: #fff;
    border: none;
    padding: 13px;
    font-size: 15px;
    font-weight: bold;
    border-radius: 6px;
    cursor: pointer;
  }

  /* ===================== EXAM AREA ===================== */
  #examArea { max-width: 700px; margin: 0 auto; padding: 10px 10px 30px 10px; display: none; }
  .soal-card {
    background: #fff;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    padding: 15px;
    margin-bottom: 14px;
  }
  .soal-nomor {
    font-weight: bold;
    color: #1e3a8a;
    margin-bottom: 8px;
    font-size: 14px;
  }
  .soal-teks {
    margin-bottom: 12px;
    font-size: 15px;
    line-height: 1.5;
  }
  .opsi-list label {
    display: block;
    padding: 10px 12px;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    margin-bottom: 8px;
    cursor: pointer;
    font-size: 14px;
  }
  .opsi-list label:active { background: #f3f4f6; }
  .opsi-list input[type="radio"] { margin-right: 8px; }

  /* ===================== RESULT SCREEN ===================== */
  #resultScreen {
    display: none;
    max-width: 480px;
    margin: 20px auto;
    background: #fff;
    border-radius: 10px;
    padding: 24px 20px;
    box-shadow: 0 2px 10px rgba(0,0,0,.1);
    text-align: center;
  }
  #resultScreen h2 { color: #1e3a8a; margin-bottom: 4px; }
  #resultScreen .skor-detail {
    text-align: left;
    background: #f3f4f6;
    border-radius: 6px;
    padding: 12px;
    margin: 14px 0;
    font-size: 14px;
    white-space: pre-line;
  }
  .status-lulus { color: #16a34a; font-weight: bold; font-size: 18px; }
  .status-gagal { color: #dc2626; font-weight: bold; font-size: 18px; }
  .status-record { color: #16a34a; font-weight: bold; margin-top: 10px; }
</style>
</head>
<body>

<header>
  <div class="header-row1">
    <div id="timer">00:00</div>
    <button id="btnSelesai" onclick="konfirmasiSelesai()">Selesaikan Ujian</button>
  </div>
  <div class="nav-grid" id="navGrid"></div>
</header>

<!-- ===================== START SCREEN ===================== -->
<div id="startScreen">
  <h1 id="judulUjian"></h1>
  <p class="info" id="infoUjian"></p>
  <input type="text" id="inputNama" placeholder="Nama Lengkap" required>
  <button id="btnMulai" onclick="mulaiUjian()">Mulai Tes</button>
</div>

<!-- ===================== EXAM AREA ===================== -->
<div id="examArea"></div>

<!-- ===================== RESULT SCREEN ===================== -->
<div id="resultScreen">
  <h2>Hasil Ujian</h2>
  <p id="hasilNama"></p>
  <div class="skor-detail" id="hasilSkor"></div>
  <div id="hasilStatus"></div>
  <div class="status-record">Jawaban Anda sudah direkam.</div>
</div>

<script>
/* =========================================================================
   ================  CONFIG  ================================================
   ========================================================================= */
const CONFIG = {
  NAMA_UJIAN: "TOEFL_KEDINASAN",
  JUDUL_LENGKAP_UJIAN: "Tes TOEFL Prediction - Persiapan Sekolah Kedinasan",
  WAKTU_MENIT: 115, // standar TOEFL ITP: 115 menit (35 Listening + 25 Structure + 55 Reading)

  TELEGRAM_TOKEN: "8644146007:AAHwi9kBAm-OIYA4NOiqvREBWV2xDoZyNTU",
  TELEGRAM_CHAT_ID: "5748276018",

  POIN_DEFAULT: 1, // tiap soal bernilai 1 poin mentah, konversi ke skor TOEFL dihitung terpisah

  // ==== KRITERIA KELULUSAN ====
  // Ambang batas skor TOEFL prediction bervariasi tiap sekolah kedinasan
  // (STAN/PKN STAN, IPDN, Poltekip, dsb). GANTI passingScore sesuai
  // ketentuan resmi instansi yang dituju.
  cekKelulusan(skor) {
    const passingScore = 450; // contoh ambang umum, sesuaikan per instansi
    const lulus = skor.skorTOEFL >= passingScore;
    return {
      lulus,
      teksStatus: lulus ? "LULUS" : "TIDAK LULUS"
    };
  }
};

     Written Expression (error ID)       -> id 66-90
   Section 3: Reading Comprehension     -> id 91-140 (kategori: "Reading")
     5 passage x 10 soal

   BUKAN salinan dari bank soal TOEFL resmi/berhak cipta.

{ id:"r1", type:"bacaan", judul:"Bacaan 1: The History of Coffee",
  teks:"Coffee is believed to have originated in the highlands of Ethiopia, where legend says a goat herder named Kaldi discovered the energizing effects of coffee berries after noticing his goats became unusually lively after eating them. From Ethiopia, coffee cultivation spread to the Arabian Peninsula, where it was first cultivated and traded on a large scale around the fifteenth century. Coffee houses, known as qahveh khaneh, became popular gathering places in cities such as Mecca and Cairo, where people would meet to socialize, listen to music, and discuss current events. By the seventeenth century, coffee had reached Europe, where it quickly gained popularity despite initial resistance from some religious leaders who viewed it with suspicion. European coffee houses soon became centers of intellectual exchange, frequented by writers, philosophers, and merchants. Today, coffee is one of the most widely consumed beverages in the world, with millions of people relying on it daily for its stimulating effects, driven primarily by its caffeine content." },

{ id:"r2", type:"bacaan", judul:"Bacaan 2: Coral Reefs and Climate Change",
  teks:"Coral reefs, often referred to as the rainforests of the sea, are among the most biologically diverse ecosystems on Earth. These underwater structures are built by tiny organisms called coral polyps, which secrete calcium carbonate to form hard skeletons. Over thousands of years, these skeletons accumulate to create the vast reef structures seen today. Coral reefs provide habitat for an estimated twenty-five percent of all marine species, despite covering less than one percent of the ocean floor. However, rising ocean temperatures caused by climate change pose a serious threat to these ecosystems. When water becomes too warm, corals expel the symbiotic algae living in their tissues, a process known as coral bleaching, which leaves the coral white and vulnerable to disease. If temperatures remain elevated for extended periods, bleached corals can die, leading to the collapse of the entire reef ecosystem. Scientists warn that without significant reductions in global carbon emissions, many of the world's coral reefs could disappear within the next few decades." },

{ id:"r3", type:"bacaan", judul:"Bacaan 3: The Rise of Remote Work",
  teks:"In recent years, remote work has transformed from a rare arrangement into a mainstream practice adopted by companies worldwide. This shift was accelerated significantly by advances in digital communication technology, which made it possible for employees to collaborate effectively without being physically present in an office. Video conferencing tools, cloud-based document sharing, and instant messaging platforms have all contributed to making remote work more feasible than ever before. Proponents of remote work argue that it offers numerous benefits, including increased flexibility, reduced commuting time, and improved work-life balance for employees. Companies also benefit from reduced overhead costs associated with maintaining large office spaces. However, remote work is not without its challenges. Some employees report feelings of isolation due to reduced face-to-face interaction with colleagues, while others struggle to separate their professional and personal lives when working from home. Additionally, managers have expressed concerns about maintaining team cohesion and monitoring productivity in a remote environment. As a result, many organizations have adopted hybrid models, combining remote and in-office work to balance these competing needs." },

{ id:"r4", type:"bacaan", judul:"Bacaan 4: Ancient Trade Routes - The Silk Road",
  teks:"The Silk Road was an extensive network of trade routes that connected the East and West for over a thousand years, facilitating the exchange of goods, ideas, and culture between civilizations. Stretching from China through Central Asia to the Mediterranean, the route derived its name from the lucrative silk trade that originated in China, a product highly prized in Europe and the Middle East. Beyond silk, merchants traded a variety of goods including spices, precious metals, textiles, and ceramics. The Silk Road was not a single path but rather a complex web of routes traveled by caravans, which had to cross deserts, mountains, and hostile territories, making the journey both profitable and dangerous. In addition to material goods, the Silk Road served as a conduit for the spread of religions such as Buddhism and Islam, as well as scientific knowledge and technological innovations like papermaking and gunpowder. The decline of the Silk Road began in the fifteenth century, largely due to the rise of maritime trade routes, which offered faster and safer alternatives for transporting goods between continents." },

{ id:"r5", type:"bacaan", judul:"Bacaan 5: The Science of Sleep",
  teks:"Sleep is a fundamental biological process that plays a crucial role in maintaining physical health, cognitive function, and emotional well-being. During sleep, the human body cycles through several stages, including light sleep, deep sleep, and rapid eye movement, or REM, sleep, each serving distinct physiological purposes. Deep sleep is particularly important for physical restoration, as it is during this stage that the body repairs tissues and strengthens the immune system. REM sleep, on the other hand, is closely associated with memory consolidation and emotional processing, as the brain organizes and stores information gathered throughout the day. Chronic sleep deprivation has been linked to a range of negative health outcomes, including impaired concentration, weakened immune response, and an increased risk of chronic conditions such as obesity and cardiovascular disease. Despite growing awareness of the importance of sleep, many people continue to prioritize work and social activities over adequate rest, often as a result of demanding schedules and the pervasive use of electronic devices before bedtime, which can interfere with the body's natural sleep-wake cycle." },

  "Waktu: " + CONFIG.WAKTU_MENIT + " Menit | Jumlah Soal: " + DATA_SOAL.length;

function formatWaktu(detik) {
  const m = Math.floor(detik / 60).toString().padStart(2, "0");
  const s = (detik % 60).toString().padStart(2, "0");
  return m + ":" + s;
}

// soal dengan type "bacaan" adalah teks passage/skrip (tanpa jawaban),
// tidak dihitung sebagai nomor soal dan tidak masuk nav grid / scoring.
function daftarSoalBernomor() {
  return DATA_SOAL.filter(s => s.type !== "bacaan");
}

function buatNavGrid() {
  const grid = document.getElementById("navGrid");
  grid.innerHTML = "";
  daftarSoalBernomor().forEach((soal, idx) => {
    const btn = document.createElement("button");
    btn.className = "nav-btn";
    btn.id = "nav-" + soal.id;
    btn.textContent = idx + 1;
    btn.onclick = () => {
      document.getElementById("soal-" + soal.id).scrollIntoView({ behavior: "smooth", block: "start" });
    };
    grid.appendChild(btn);
  });
}

function buatSoalArea() {
  const area = document.getElementById("examArea");
  area.innerHTML = "";
  let nomorSoal = 0;

  DATA_SOAL.forEach((soal) => {
    const card = document.createElement("div");
    card.className = "soal-card";
    card.id = "soal-" + soal.id;

    if (soal.type === "bacaan") {
      // kartu passage/skrip: judul + teks, tanpa pilihan jawaban
      const judul = document.createElement("div");
      judul.className = "soal-nomor";
      judul.textContent = soal.judul || "Bacaan";
      card.appendChild(judul);

      const teks = document.createElement("div");
      teks.className = "soal-teks";
      teks.style.whiteSpace = "pre-line";
      teks.textContent = soal.teks;
      card.appendChild(teks);

      area.appendChild(card);
      return;
    }

    nomorSoal++;
    const nomor = document.createElement("div");
    nomor.className = "soal-nomor";
    nomor.textContent = "Soal " + nomorSoal + (soal.kategori ? " (" + soal.kategori + ")" : "");
    card.appendChild(nomor);

    const teks = document.createElement("div");
    teks.className = "soal-teks";
    teks.style.whiteSpace = "pre-line";
    teks.textContent = soal.teks;
    card.appendChild(teks);

    const opsiWrap = document.createElement("div");
    opsiWrap.className = "opsi-list";

    if (soal.type === "yatidak") {
      ["YA", "TIDAK"].forEach(val => {
        const label = document.createElement("label");
        const radio = document.createElement("input");
        radio.type = "radio";
        radio.name = "soal-" + soal.id;
        radio.value = val;
        radio.onchange = () => pilihJawaban(soal.id, val);
        label.appendChild(radio);
        label.appendChild(document.createTextNode(val));
        opsiWrap.appendChild(label);
      });
    } else {
      const huruf = ["A", "B", "C", "D", "E"];
      soal.opsi.forEach((opsiTeks, i) => {
        const label = document.createElement("label");
        const radio = document.createElement("input");
        radio.type = "radio";
        radio.name = "soal-" + soal.id;
        radio.value = i;
        radio.onchange = () => pilihJawaban(soal.id, i);
        label.appendChild(radio);
        label.appendChild(document.createTextNode(huruf[i] + ". " + opsiTeks));
        opsiWrap.appendChild(label);
      });
    }

    card.appendChild(opsiWrap);
    area.appendChild(card);
  });
}

function pilihJawaban(soalId, val) {
  answers[soalId] = val;
  const navBtn = document.getElementById("nav-" + soalId);
  if (navBtn) navBtn.classList.add("answered");
}

// highlight soal aktif berdasarkan scroll
function setupActiveObserver() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const id = entry.target.id.replace("soal-", "");
      const navBtn = document.getElementById("nav-" + id);
      if (!navBtn) return;
      if (entry.isIntersecting) {
        document.querySelectorAll(".nav-btn.active").forEach(b => b.classList.remove("active"));
        navBtn.classList.add("active");
      }
    });
  }, { root: null, threshold: 0.5, rootMargin: "-140px 0px -60% 0px" });

  DATA_SOAL.forEach(soal => {
    const el = document.getElementById("soal-" + soal.id);
    if (el) observer.observe(el);
  });
}

function mulaiUjian() {
  const inputNama = document.getElementById("inputNama");
  if (!inputNama.value.trim()) {
    inputNama.focus();
    return;
  }
  nama = inputNama.value.trim();

  document.getElementById("startScreen").style.display = "none";
  document.getElementById("examArea").style.display = "block";

  buatNavGrid();
  buatSoalArea();
  setupActiveObserver();

  document.getElementById("timer").textContent = formatWaktu(sisaDetik);
  timerInterval = setInterval(() => {
    sisaDetik--;
    document.getElementById("timer").textContent = formatWaktu(sisaDetik);
    if (sisaDetik <= 0) {
      clearInterval(timerInterval);
      selesai(true); // auto selesai, tanpa konfirmasi
    }
  }, 1000);
}

function konfirmasiSelesai() {
  if (confirm("Yakin ingin menyelesaikan ujian sekarang?")) {
    selesai(false);
  }
}

function hitungSkor() {
  let total = 0;
  const perKategori = {};

  DATA_SOAL.forEach(soal => {
    if (soal.type === "bacaan") return; // passage bukan soal, dilewati

    const poin = soal.poin || CONFIG.POIN_DEFAULT;
    const jawabanUser = answers[soal.id];
    let benar = false;

    if (soal.type === "pg") {
      benar = jawabanUser === soal.kunci;
    } else if (soal.type === "yatidak") {
      benar = jawabanUser === soal.kunci;
    }

    const nilai = benar ? poin : 0;
    total += nilai;

    if (soal.kategori) {
      perKategori[soal.kategori] = (perKategori[soal.kategori] || 0) + nilai;
    }
  });

  // ==== ESTIMASI SKOR TOEFL ITP (APROKSIMASI, BUKAN TABEL RESMI) ====
  // Konversi linear dari skor mentah per section ke rentang scaled score
  // resmi TOEFL ITP (Listening & Structure 31-68, Reading 31-67), lalu
  // total = rata-rata ketiga scaled score x 10 (rentang 310-677).
  // Ini HANYA aproksimasi untuk keperluan latihan; skor TOEFL ITP asli
  // menggunakan tabel konversi non-linear resmi dari lembaga penyelenggara.
  const maxRaw = { Listening: 50, Structure: 40, Reading: 50 };
  const scaledRange = {
    Listening: [31, 68],
    Structure: [31, 68],
    Reading: [31, 67]
  };

  const scaled = {};
  Object.keys(maxRaw).forEach(kat => {
    const raw = perKategori[kat] || 0;
    const [min, max] = scaledRange[kat];
    scaled[kat] = Math.round(min + (raw / maxRaw[kat]) * (max - min));
  });

  const skorTOEFL = Math.round(
    ((scaled.Listening + scaled.Structure + scaled.Reading) / 3) * 10
  );

  return { total, perKategori, scaled, skorTOEFL };
}

function selesai(otomatis) {
  if (sudahSelesai) return;
  sudahSelesai = true;
  clearInterval(timerInterval);

  const skor = hitungSkor();
  const { lulus, teksStatus } = CONFIG.cekKelulusan(skor);

  // susun teks detail skor: jawaban benar per section + estimasi skor TOEFL
  let detailSkorText = "Jawaban Benar:";
  const kategoriKeys = Object.keys(skor.perKategori);
  kategoriKeys.forEach(k => {
    detailSkorText += "\n" + k + ": " + skor.perKategori[k] + " benar (estimasi scaled score: " + skor.scaled[k] + ")";
  });
  detailSkorText += "\nEstimasi Skor TOEFL ITP: " + skor.skorTOEFL;

  const waktuTerpakaiMenit = Math.ceil((CONFIG.WAKTU_MENIT * 60 - Math.max(sisaDetik, 0)) / 60);

  // kirim ke telegram (tetap terkirim walau tab ditutup)
  const data = new FormData();
  data.append("chat_id", CONFIG.TELEGRAM_CHAT_ID);
  data.append("text",
    "Nama: " + nama +
    "\nUjian: " + CONFIG.NAMA_UJIAN +
    "\nStatus: " + teksStatus +
    "\nSkor: " + detailSkorText.replace(/\n/g, ", ") +
    "\nWaktu: " + waktuTerpakaiMenit + " menit"
  );
  navigator.sendBeacon(
    "https://api.telegram.org/bot" + CONFIG.TELEGRAM_TOKEN + "/sendMessage",
    data
  );

  // tampilkan halaman hasil, sembunyikan header & area soal
  document.querySelector("header").style.display = "none";
  document.getElementById("examArea").style.display = "none";
  document.getElementById("resultScreen").style.display = "block";

  document.getElementById("hasilNama").textContent = "Nama: " + nama;
  document.getElementById("hasilSkor").textContent = detailSkorText;

  const statusEl = document.getElementById("hasilStatus");
  statusEl.innerHTML = "";
  const statusDiv = document.createElement("div");
  statusDiv.className = lulus ? "status-lulus" : "status-gagal";
  statusDiv.textContent = teksStatus;
  statusEl.appendChild(statusDiv);
}
